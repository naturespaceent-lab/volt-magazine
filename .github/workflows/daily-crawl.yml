name: Daily Crawl
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run crawler
        run: node crawl.mjs
      - name: Clean orphaned images
        run: |
          if [ -d images ]; then
            referenced=$(grep -roh 'images/[^"'"'"' >)]*' index.html articles/ 2>/dev/null | sed 's|.*/images/||' | sort -u)
            for f in images/*; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              echo "$referenced" | grep -qxF "$fname" || { echo "Removing orphan: $fname"; rm "$f"; }
            done
          fi
      - name: Commit updated files
        run: |
          git config user.name "Auto Crawler"
          git config user.email "crawler@bot.com"
          git add -A index.html articles/ images/ _headers
          git diff --staged --quiet || git commit -m "chore: daily crawl $(date +%Y-%m-%d)"
          git push
