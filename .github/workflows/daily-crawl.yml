name: Daily Crawl
on:
  schedule:
    - cron: ''
  workflow_dispatch:
permissions:
  contents: write
jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run crawler
        run: node crawl.mjs
      - name: Commit updated files
        run: |
          git config user.name "Auto Crawler"
          git config user.email "crawler@bot.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: daily crawl $(date +%Y-%m-%d)"
          git push
